<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>Admin Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
        color: #333;
      }
      #controls {
        display: flex;
        align-items: center;
        gap: 15px;
        background: #f4f4f9;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
      }
      button {
        padding: 8px 16px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background-color: #0056b3;
      }
      .info-text {
        font-size: 14px;
        font-weight: bold;
      }
      .stats-text {
        font-size: 13px;
        color: #666;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: left;
      }
      th {
        background-color: #f8f9fa;
        font-weight: 600;
      }
      tr:nth-child(even) {
        background-color: #fdfdfd;
      }
      .message-cell {
        font-style: italic;
        color: #666;
        text-align: center;
      }
      .error-cell {
        color: #d9534f;
        text-align: center;
      }
      .nav-tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
      }
      .nav-tab {
        padding: 10px 20px;
        cursor: pointer;
        background: #f8f9fa;
        border: 1px solid transparent;
        border-bottom: none;
        font-weight: bold;
      }
      .nav-tab.active {
        background: #fff;
        border-color: #ddd;
        border-radius: 4px 4px 0 0;
        margin-bottom: -2px;
        border-bottom: 2px solid #fff;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .form-group {
        margin-bottom: 15px;
        max-width: 400px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      #add-student-message {
        margin-bottom: 10px;
        font-weight: bold;
      }
      .msg-success { color: green; }
      .msg-error { color: red; }
    </style>
  </head>
  <body>
    <h1>Admin Dashboard</h1>

    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('logs-tab', this)">Logs</div>
      <div class="nav-tab" onclick="switchTab('students-tab', this); fetchStudents();">Students List</div>
      <div class="nav-tab" onclick="switchTab('add-student-tab', this)">Add Student</div>
    </div>
    
    <!-- L O G S   T A B -->
    <div id="logs-tab" class="tab-content active">
      <div id="controls">
        <button id="btn-prev" onclick="changePage(-1)" disabled>Previous</button>
        <span class="info-text" id="page-info">Loading...</span>
        <button id="btn-next" onclick="changePage(1)" disabled>Next</button>
        <span class="stats-text" id="stats-info"></span>
      </div>

      <table id="logs-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Student ID</th>
            <th>Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" class="message-cell">Loading data...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- S T U D E N T S   T A B -->
    <div id="students-tab" class="tab-content">
      <button onclick="fetchStudents()" style="margin-bottom: 15px;">Refresh Students</button>
      <table id="students-table">
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>QR Drive Link</th>
            <th>Current Status</th>
            <th>Last Scan Time</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6" class="message-cell">Loading students...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- A D D   S T U D E N T   T A B -->
    <div id="add-student-tab" class="tab-content">
      <h3>Add New Student</h3>
      <div id="add-student-message"></div>
      <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="new-student-id" required placeholder="e.g. 12345" />
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-student-name" required placeholder="e.g. John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-student-email" required placeholder="e.g. john@example.com" />
      </div>
      <button onclick="submitNewStudent()" id="btn-submit-student">Create Student & Generate QR</button>
    </div>
    
    <script>
      // Tab switching logic
      function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
      }

      let currentPage = 1;
      let totalPages = 1;

      // Handle Previous / Next clicks
      function changePage(delta) {
        let newPage = currentPage + delta;
        if (newPage >= 1 && newPage <= totalPages) {
          fetchLogs(newPage);
        }
      }

      function fetchLogs(pageNum) {
        const tbody = document.querySelector("#logs-table tbody");
        tbody.innerHTML = '<tr><td colspan="4" class="message-cell">Loading data...</td></tr>';
        
        // Disable buttons while fetching
        document.getElementById("btn-prev").disabled = true;
        document.getElementById("btn-next").disabled = true;

        console.log(`Fetching logs for page ${pageNum}...`);
        
        google.script.run
          .withSuccessHandler(function(response) {
            console.log("Logs fetched successfully:", response);
            currentPage = response.pageNumber;
            totalPages = response.totalPages;

            // Update control texts
            document.getElementById("page-info").textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById("stats-info").textContent = `| Total Rows: ${response.totalRows} | Showing: ${response.rowsShowing}`;
            
            // Re-enable/disable buttons accordingly
            document.getElementById("btn-prev").disabled = (currentPage <= 1);
            document.getElementById("btn-next").disabled = (currentPage >= totalPages);

            // Render table rows
            tbody.innerHTML = '';
            
            if (!response.data || response.data.length === 0) {
              tbody.innerHTML = '<tr><td colspan="4" class="message-cell">No logs found.</td></tr>';
              return;
            }

            response.data.forEach(row => {
              const tr = document.createElement("tr");
              row.forEach((cellData) => {
                const td = document.createElement("td");
                td.textContent = cellData !== undefined ? cellData : "";
                tr.appendChild(td);
              });
              tbody.appendChild(tr);
            });
          })
          .withFailureHandler(function(error) {
            console.error("Error fetching logs:", error);
            tbody.innerHTML = `<tr><td colspan="4" class="error-cell">Error loading data: ${error.message || 'Unknown error'}</td></tr>`;
            
            // On error, let them try moving pages if possible, or retry
            document.getElementById("btn-prev").disabled = (currentPage <= 1);
            document.getElementById("btn-next").disabled = (currentPage >= totalPages);
          })
          .getLogs(pageNum);
      }

      // Initial load: Fetch the first page (most recent entries)
      document.addEventListener("DOMContentLoaded", function() {
        fetchLogs(currentPage);
      });

      // Fetch students list
      function fetchStudents() {
        const tbody = document.querySelector("#students-table tbody");
        tbody.innerHTML = '<tr><td colspan="6" class="message-cell">Loading students...</td></tr>';
        
        google.script.run
          .withSuccessHandler(function(response) {
            tbody.innerHTML = '';
            if (response.success) {
              if (response.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="message-cell">No students found.</td></tr>';
                return;
              }
              response.data.forEach(row => {
                const tr = document.createElement("tr");
                row.forEach((cellData, index) => {
                  const td = document.createElement("td");
                  // If it's the QR drive link column (index 3) and it's a URL, make it a link
                  if (index === 3 && cellData && cellData.startsWith('http')) {
                    const a = document.createElement("a");
                    a.href = cellData;
                    a.target = "_blank";
                    a.textContent = "View QR";
                    td.appendChild(a);
                  } else {
                    td.textContent = cellData !== undefined ? cellData : "";
                  }
                  tr.appendChild(td);
                });
                tbody.appendChild(tr);
              });
            } else {
              tbody.innerHTML = `<tr><td colspan="6" class="error-cell">Error: ${response.message}</td></tr>`;
            }
          })
          .withFailureHandler(function(error) {
            tbody.innerHTML = `<tr><td colspan="6" class="error-cell">Failed: ${error.message}</td></tr>`;
          })
          .getAllStudents();
      }

      // Add a new student
      function submitNewStudent() {
        const idInput = document.getElementById("new-student-id");
        const nameInput = document.getElementById("new-student-name");
        const emailInput = document.getElementById("new-student-email");
        const msgDiv = document.getElementById("add-student-message");
        const btn = document.getElementById("btn-submit-student");

        const id = idInput.value.trim();
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();

        if (!id || !name || !email) {
          msgDiv.textContent = "Please fill out all fields.";
          msgDiv.className = "msg-error";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Processing...";
        msgDiv.textContent = "Creating student and uploading QR. Please wait...";
        msgDiv.className = "";

        google.script.run
          .withSuccessHandler(function(response) {
            btn.disabled = false;
            btn.textContent = "Create Student & Generate QR";
            if (response.success) {
              msgDiv.textContent = response.message + " QR Link: " + response.driveLink;
              msgDiv.className = "msg-success";
              idInput.value = "";
              nameInput.value = "";
              emailInput.value = "";
            } else {
              msgDiv.textContent = "Error: " + response.message;
              msgDiv.className = "msg-error";
            }
          })
          .withFailureHandler(function(error) {
            btn.disabled = false;
            btn.textContent = "Create Student & Generate QR";
            msgDiv.textContent = "Failed: " + error.message;
            msgDiv.className = "msg-error";
          })
          .createStudent(id, name, email);
      }
    </script>
  </body>
</html>
