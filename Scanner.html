<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f4f4f9;
        padding-top: 50px;
      }
      .card {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
      }
      input {
        width: 80%;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #feedback {
        margin-top: 20px;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
        display: none;
      }
      /* UI Status Colors */
      .status-in { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .status-out { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
  </head>
  <body>

    <div class="card">
      <h2>Campus Gate Scanner</h2>
      <p>Use the external camera scanner below to record entry or exit.</p>
      
      <a id="scannerLink" href="https://legendary-torte-d58083.netlify.app" target="_blank" class="btn" style="text-decoration: none; display: inline-block; padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border-radius: 4px;">
        📸 Open Scanner
      </a>
      
      <div id="feedback"></div>
    </div>

    <script>
      // Automatically fetch the Apps Script Web App URL and append it to our scanner link
      window.onload = function() {
        google.script.run.withSuccessHandler(function(url) {
          const scannerLink = document.getElementById('scannerLink');
          if (scannerLink && url) {
            scannerLink.href = "https://legendary-torte-d58083.netlify.app?callback=" + encodeURIComponent(url);
          }
        }).getAppUrl();
      };
    </script>
  </body>
</html>
